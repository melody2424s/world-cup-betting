  * { margin: 0; padding: 0; box-sizing: border-box; }

    background: #0D1B2E;
    color: #CCD8E8;
    min-height: 100vh;
    padding-bottom: 50px;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 16px; }

  header {
    background: linear-gradient(180deg, #131F30 0%, #0D1B2E 100%);
    border-bottom: 1px solid #1E2E3E;
    padding: 20px 0;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-size: 20px; font-weight: 700; color: #fff;
    display: flex; align-items: center; gap: 8px;
  }
  header h1 .gold { color: #F0C040; }
  header p { font-size: 12px; color: #6A8CAA; margin-top: 4px; }

  .tabs {
    display: flex; gap: 4px; margin-top: 14px;
    border-bottom: 1px solid #1E2E3E;
  }
  .tab {
    padding: 9px 16px; font-size: 14px; color: #6A8CAA;
    cursor: pointer; border-bottom: 2px solid transparent;
    background: none; border-left: none; border-right: none; border-top: none;
    font-weight: 600;
  }
  .tab.active { color: #F0C040; border-bottom-color: #F0C040; }

  main { padding-top: 20px; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* 战绩横条 */
  .record-bar {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .record-card {
    flex: 1; background: #131F30; border: 1px solid #1E2E3E; border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .record-card .num { font-size: 22px; font-weight: 800; color: #F0C040; }
  .record-card .lbl { font-size: 11px; color: #6A8CAA; margin-top: 2px; }

  /* 比赛卡片 */
  .match-card {
    background: #131F30; border: 1px solid #1E2E3E; border-radius: 12px;
    padding: 16px; margin-bottom: 14px;
  }
  .match-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 11px; color: #6A8CAA;
  }
  .group-badge {
    background: #1A2F45; color: #6A8CAA; padding: 2px 8px; border-radius: 4px;
  }
  .risk-badge {
    padding: 2px 8px; border-radius: 4px; font-weight: 600;
  }
  .risk-low { background: #1A3320; color: #5AD48A; }
  .risk-medium, .risk-low-medium { background: #2A2410; color: #F0C040; }
  .risk-high { background: #331A1A; color: #E25A5A; }

  .teams-row {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin-bottom: 12px;
  }
  .team-name { font-size: 17px; font-weight: 700; color: #fff; }
  .vs-tag { font-size: 12px; color: #4A6A8A; }

  .odds-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;
  }
  .odds-box {
    background: #0D1824; border-radius: 8px; padding: 8px; text-align: center;
  }
  .odds-box .lbl { font-size: 10px; color: #6A8CAA; }
  .odds-box .val { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .odds-fav { color: #5AD48A; }
  .odds-mid { color: #F0C040; }
  .odds-dog { color: #E25A5A; }

  .signal-bar {
    background: #0D1824; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
    font-size: 12px; color: #8AAABB; display: flex; gap: 8px; align-items: baseline;
  }
  .signal-strength { font-weight: 700; padding: 1px 8px; border-radius: 4px; font-size: 11px; }
  .sig-极强 { background: #2A1F10; color: #F0A040; }
  .sig-强 { background: #102A3A; color: #5AC4DA; }
  .sig-中 { background: #1A2A3A; color: #6A9ACA; }
  .sig-弱 { background: #1A1A1A; color: #888; }

  .wave-title {
    font-size: 12px; color: #6A8CAA; margin-bottom: 8px; font-weight: 600;
  }
  .wave-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px;
  }
  .wave-item {
    background: #0D1824; border: 1px solid #1A2A3A; border-radius: 6px;
    padding: 6px 10px; display: flex; justify-content: space-between; align-items: center;
  }
  .wave-item.best { background: #16241a; border-color: #2a5535; }
  .wave-item .wlbl { font-size: 10px; color: #5A7A8A; }
  .wave-item .wscore { font-size: 13px; font-weight: 700; }
  .wave-item.best .wscore { color: #F0C040; }
  .wave-item .wodds { font-size: 11px; color: #4A8A5A; font-weight: 600; }

  .action-box {
    background: #16241a; border: 1px solid #2a5535; border-radius: 8px;
    padding: 10px 12px; font-size: 13px; color: #5AD48A; font-weight: 600;
    margin-bottom: 8px;
  }
  .handicap-line {
    font-size: 12px; color: #8AAABB; padding: 0 2px;
  }

  /* 历史战绩列表 */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    background: #131F30; border: 1px solid #1E2E3E; color: #6A8CAA;
    padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
  }
  .filter-btn.active { background: #1A2F45; color: #F0C040; border-color: #2A5070; }

  .history-row {
    background: #131F30; border: 1px solid #1E2E3E; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 6px;
    display: grid; grid-template-columns: 60px 1fr 60px 60px 56px;
    align-items: center; gap: 8px; font-size: 13px;
  }
  .history-row .hdate { color: #6A8CAA; font-size: 11px; }
  .history-row .hteams { color: #fff; font-weight: 500; }
  .history-row .hscore { text-align: center; font-weight: 700; color: #F0C040; }
  .pill { font-size: 10px; padding: 3px 7px; border-radius: 8px; text-align: center; font-weight: 700; }
  .pill.hit { background: #1A3320; color: #5AD48A; }
  .pill.miss { background: #331A1A; color: #E25A5A; }

  .history-row-v2 {
    background: #131F30; border: 1px solid #1E2E3E; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 8px;
  }
  .hr-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px; font-size: 11px;
  }
  .history-row-v2 .hdate { color: #6A8CAA; }
  .history-row-v2 .hteams { color: #fff; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .history-row-v2 .actual-tag {

  }
  .options-line { font-size: 12px; color: #6A8CAA; }
  .options-line b { font-weight: 700; }

  @media (max-width: 600px) {
    .history-row { grid-template-columns: 1fr; gap: 3px; }
    .history-row .hscore { text-align: left; }
  }

  footer {
    text-align: center; padding: 24px 16px; color: #2A4A5A; font-size: 11px;
  }

  .disclaimer {
    background: #2A2010; border: 1px solid #4A3A15; border-radius: 8px;
    padding: 10px 14px; font-size: 11px; color: #C0A050; margin-bottom: 20px;
  }

  /* 权重总览卡片 */
  .weight-overview {
    background: #131F30; border: 1px solid #1E2E3E; border-radius: 12px;
    padding: 16px; margin-bottom: 20px;
  }
  .wo-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .wo-sub { font-size: 11px; color: #6A8CAA; margin-bottom: 14px; }
  .wo-bars { display: flex; flex-direction: column; gap: 10px; }
  .wo-bar-row { display: grid; grid-template-columns: 90px 1fr 40px; align-items: center; gap: 10px; }

  .wo-bar-track { background: #0D1824; border-radius: 6px; height: 10px; overflow: hidden; }
  .wo-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #F0C040, #5AD48A); }
  .wo-bar-pct { font-size: 12px; color: #F0C040; font-weight: 700; text-align: right; }

  .sim-market-row {
    background: #0D1824; border-radius: 8px; padding: 8px 12px;

  }
  .sim-wave-item {
    background: #0D1824; border-radius: 6px; padding: 6px 10px;
    display: flex; justify-content: space-between; align-items: center; font-size: 11px;

  .sim-wave-item .swpts { color: #CCD8E8; }
  .sim-wave-item .swpayout { color: #5AD48A; font-weight: 600; }

  .sim-result-box {
    background: linear-gradient(135deg, #16241a 0%, #131F30 100%);
    border: 1px solid #2a5535; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  .sr-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px; font-size: 13px;
  }
  .sr-row .srlabel { color: #8AAABB; }
  .sr-row .srval { font-weight: 700; color: #fff; }
  .sr-row .srval.profit { color: #5AD48A; }
  .sr-row .srval.rate { color: #F0C040; font-size: 18px; }
  .sr-note {
    font-size: 10px; color: #4A7A9A; margin-top: 6px;
    border-top: 1px solid #1a3a2a; padding-top: 6px;
  }
</style>
</head>

  <section class="panel" id="history">

    <div id="historyList"></div>
  </section>

</main>

<footer>

</footer>

<script>
// ===== Tab 切换 =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

function oddsClass(odds) {
  if (odds < 2.0) return 'odds-fav';
  if (odds < 4.5) return 'odds-mid';
  return 'odds-dog';
}

// ===== 权重总览（替代金额方案） =====
function renderWeightOverview() {
  const card = document.getElementById('weightOverview');
  if (!STRATEGY_DATA.matches || STRATEGY_DATA.matches.length === 0) {
    card.innerHTML = `<div class="wo-title">暂无进行中赛事</div><div class="wo-sub">${STRATEGY_DATA.subtitle}</div>`;
    return;
  }
  const bars = STRATEGY_DATA.matches.map(m => `
    <div class="wo-bar-row">
      <div class="wo-bar-label">${m.home}vs${m.away}</div>
      <div class="wo-bar-track"><div class="wo-bar-fill" style="width:${m.overall_weight}%"></div></div>
      <div class="wo-bar-pct">${m.overall_weight}%</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="wo-title">本轮关注度配置</div>
    <div class="wo-sub">${STRATEGY_DATA.subtitle}</div>
    <div class="wo-bars">${bars}</div>
  `;
}

// ===== 今日推荐面板 =====
function renderBettingGuide() {
  const list = document.getElementById('bettingList');
  if (!BETTING_DATA || BETTING_DATA.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 16px;color:#4A6A8A;font-size:14px;">本轮赛事已结束，等待新一轮赛程和赔率数据更新</div>';
    return;
  }
  list.innerHTML = BETTING_DATA.map((m, idx) => {
    const strategy = STRATEGY_DATA.matches[idx];

    const waveItems = m.wave_options.map((w, i) => `
      <div class="wave-item ${i === 0 ? 'best' : ''}">
        <span class="wlbl">${w.label}</span>
        <span class="wscore">${w.score}</span>
        <span class="wodds">${w.odds.toFixed(2)}</span>
      </div>
    `).join('');

    return `
      <div class="match-card">
        <div class="match-top">
          <span class="group-badge">${m.group} · ${m.time}</span>
          <span class="risk-badge risk-${m.risk}">${riskLabel(m.risk)}</span>
        </div>
        <div class="teams-row">
          <span class="team-name">${m.home}</span>
          <span class="vs-tag">VS</span>
          <span class="team-name">${m.away}</span>
        </div>

        <div class="signal-bar">
          <span class="signal-strength sig-${m.signal}">信号${m.signal}</span>
          <span>${m.signal_note}</span>
        </div>

        <div class="market-row">
          <span class="market-label">主胜盘</span>
          <span class="market-content">
            <span class="weight-tag wt-${weightFromOverall(strategy.overall_weight, 'main')}">${weightFromOverall(strategy.overall_weight, 'main')}</span>
            ${strategy.main_market.side} <span style="color:#6A8CAA">(${strategy.main_market.note})</span>
            · 主${m.odds_home.toFixed(2)} 平${m.odds_draw.toFixed(2)} 客${m.odds_away.toFixed(2)}
          </span>
        </div>

        <div class="market-row">
          <span class="market-label">让球盘</span>
          <span class="market-content">
            <span class="weight-tag wt-${strategy.handicap.weight}">${strategy.handicap.weight}</span>
            ${strategy.handicap.side} ${strategy.handicap.line} @ ${strategy.handicap.odds.toFixed(2)}
          </span>
        </div>

        <div class="market-row">
          <span class="market-label">波胆盘</span>
          <span class="market-content">
            <span class="weight-tag wt-${strategy.wave.weight}">${strategy.wave.weight}</span>
            4选项分散，覆盖比分如下
          </span>
        </div>

        <div class="wave-title">波胆比分参考（反向加权覆盖）</div>
        <div class="wave-grid">${waveItems}</div>
      </div>
    `;
  }).join('');
}

function weightFromOverall(w, type) {
  if (type === 'main') {
    if (w >= 40) return '重配';
    if (w >= 25) return '中配';
    if (w >= 15) return '轻配';
    return '不参与';
  }
  return '中配';
}

function riskLabel(risk) {
  const map = { 'low': '关注度高', 'medium': '关注度中', 'high': '关注度低', 'low-medium': '关注度中高' };
  return map[risk] || risk;
}


// ===== 历史战绩面板（4选项任一命中口径） =====
function renderRecordBar() {
  const bar = document.getElementById('recordBar');
  bar.innerHTML = `
    <div class="record-card">
      <div class="num">${STATS_DATA.total_with_prediction}</div>
      <div class="lbl">总场次</div>
    </div>
    <div class="record-card">
      <div class="num">${STATS_DATA.any_hit_count}</div>
      <div class="lbl">任一命中场数</div>
    </div>
    <div class="record-card">
      <div class="num">${Math.round(STATS_DATA.any_hit_rate * 100)}%</div>
      <div class="lbl">命中率</div>
    </div>
  `;
}

let historyFilter = 'all';

function filterHistory() {
  switch (historyFilter) {
    case 'hit': return TRACK_DATA.filter(m => m.any_hit);
    case 'dirhit': return TRACK_DATA.filter(m => !m.any_hit);
    default: return TRACK_DATA;
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const data = filterHistory();
  if (data.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#4A6A8A;">暂无记录</div>';
    return;
  }
  list.innerHTML = data.map(m => {
    const pillClass = m.any_hit ? 'hit' : 'miss';
    const pillText = m.any_hit ? '命中' : '未中';
    const optionsStr = m.options.map(o => o === m.actual ? `<b style="color:#5AD48A">${o}</b>` : o).join(' / ');
    return `
      <div class="history-row-v2">
        <div class="hr-top">
          <span class="hdate">${m.date.slice(5)} [${m.group}]</span>
          <span class="pill ${pillClass}">${pillText}</span>
        </div>
        <div class="hteams">${m.home} vs ${m.away} <span class="actual-tag">实际 ${m.actual}</span></div>
        <div class="options-line">4选项：${optionsStr}</div>
      </div>
    `;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    historyFilter = btn.dataset.f;
    renderHistory();
  });
});

// ===== 1000点模拟配置页面 =====
function renderSimSummary() {
  if (!SIM_DATA || SIM_DATA.length === 0) {
    document.getElementById('simSummary').innerHTML = '';
    document.getElementById('simDetail').innerHTML = '<div style="text-align:center;padding:40px 16px;color:#4A6A8A;font-size:14px;">暂无可模拟场次，等待新一轮赛程数据</div>';
    return;
  }
  const avgRate = SIM_DATA.reduce((s, m) => s + m.summary.profit_rate, 0) / SIM_DATA.length;
  const maxRate = Math.max(...SIM_DATA.map(m => m.summary.profit_rate));
  const minRate = Math.min(...SIM_DATA.map(m => m.summary.profit_rate));

  document.getElementById('simSummary').innerHTML = `
    <div class="sc"><div class="n">+${avgRate.toFixed(1)}%</div><div class="l">平均收益率</div></div>
    <div class="sc"><div class="n">+${maxRate.toFixed(1)}%</div><div class="l">最高收益率</div></div>
    <div class="sc"><div class="n">+${minRate.toFixed(1)}%</div><div class="l">最低收益率</div></div>
    <div class="sc"><div class="n">1000</div><div class="l">每场独立点数</div></div>
  `;
}

function renderSimDetail() {
  const container = document.getElementById('simDetail');
  if (!SIM_DATA || SIM_DATA.length === 0) return;
  container.innerHTML = SIM_DATA.map(m => {
    const waveItems = m.wave_detail.map(w => `
      <div class="sim-wave-item">
        <span class="swscore">${w.score}</span>
        <span class="swpts">${w.points}点</span>
        <span class="swpayout">→${w.payout}</span>
      </div>
    `).join('');

    const s = m.summary;

    return `
      <div class="sim-card">
        <div class="sim-title">
          <span>${m.match}（押${m.pick_side}胜）</span>
          <span class="sim-total">每场1000点</span>
        </div>
        <div class="sim-sub">信号${m.signal} · 三玩法按信号强度分配占比</div>

        <div class="sim-result-box">
          <div class="sr-row">
            <span class="srlabel">完全命中总回报</span>
            <span class="srval">${s.total_payout}点</span>
          </div>
          <div class="sr-row">
            <span class="srlabel">净盈利</span>
            <span class="srval profit">+${s.total_profit}点</span>
          </div>
          <div class="sr-row">
            <span class="srlabel">收益率</span>
            <span class="srval rate">+${s.profit_rate}%</span>
          </div>
          <div class="sr-note">假设比分为${s.hit_score}，主胜/让球/波胆三个玩法同时命中</div>
        </div>

        <div class="sim-markets">
          <div class="sim-market-row">
            <span class="smlabel">主胜盘</span>
            <span class="smpts">${m.main_points}点 @${m.main_odds.toFixed(2)}</span>
            <span class="smpayout">命中→${m.main_payout}点</span>
          </div>
          <div class="sim-market-row">
            <span class="smlabel">让球盘</span>
            <span class="smpts">${m.handicap_points}点 ${m.handicap_side}${m.handicap_line}@${m.handicap_odds.toFixed(2)}</span>
            <span class="smpayout">命中→${m.handicap_payout}点</span>
          </div>
          <div class="sim-market-row">
            <span class="smlabel">波胆盘</span>
            <span class="smpts">${m.wave_points}点（4选项分散）</span>
            <span class="smpayout"></span>
          </div>
        </div>
        <div class="sim-wave-grid">${waveItems}</div>
      </div>
    `;
  }).join('');
}

function renderSimCharts() {
  if (!SIM_DATA || SIM_DATA.length === 0) return;
  // 图1: 四场玩法占比对比(每场都是1000点为基准)
  new Chart(document.getElementById('simPieChart'), {
    type: 'bar',
    data: {
      labels: SIM_DATA.map(m => m.match),
      datasets: [
        { label: '主胜', data: SIM_DATA.map(m => m.main_points), backgroundColor: '#6A8CAA' },
        { label: '让球', data: SIM_DATA.map(m => m.handicap_points), backgroundColor: '#4AAACA' },
        { label: '波胆', data: SIM_DATA.map(m => m.wave_points), backgroundColor: '#F0C040' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#CCD8E8', font: { size: 11 } } }
      },
      scales: {
        x: { stacked: true, ticks: { color: '#6A8CAA', font: { size: 10 } }, grid: { display: false } },
        y: { stacked: true, max: 1000, ticks: { color: '#6A8CAA' }, grid: { color: '#1E2E3E' } }
      }
    }
  });

  // 图2: 完全命中情况下各场收益率对比
  new Chart(document.getElementById('simBarChart'), {
    type: 'bar',
    data: {
      labels: SIM_DATA.map(m => m.match),
      datasets: [
        { label: '完全命中收益率(%)', data: SIM_DATA.map(m => m.summary.profit_rate), backgroundColor: '#5AD48A' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { ticks: { color: '#6A8CAA', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#6A8CAA', callback: v => '+' + v + '%' }, grid: { color: '#1E2E3E' } }
      }
    }
  });
}

// ===== 初始化 =====
renderWeightOverview();
renderBettingGuide();
renderRecordBar();
renderHistory();
renderSimSummary();
renderSimDetail();
renderSimCharts();

</script>
